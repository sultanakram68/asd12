<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="lmixi — A premium platform for clean design, fast performance, and secure solutions.">
    <title>lmixi — Premium Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Floating Particles Background -->
    <div class="particles" id="particles"></div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="logo">lmixi</div>
        <ul class="nav-links">
            <li><a href="#home" data-i18n="nav_home">Home</a></li>
        </ul>
        <div class="nav-actions">
            <!-- Language Selector Removed -->

            <!-- Search Icon -->
            <div class="search-wrapper" id="search-wrapper">
                <div class="search-glow"></div>
                <button class="search-btn" id="search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>

            <button class="btn btn-outline nav-btn-desktop" id="signin-open-btn" data-i18n="nav_signin">Sign In</button>
            <button class="btn btn-primary nav-btn-desktop" data-i18n="nav_getstarted">Get Started</button>

            <!-- Hamburger Menu -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Side Menu -->
    <div class="overlay" id="overlay"></div>
    <div class="side-menu" id="side-menu">
        <div class="side-menu-header">
            <span>.</span>
            <button class="close-btn" id="close-menu">✕</button>
        </div>
        <div class="side-menu-body">
            <a href="#" class="side-link main-option">.</a>
            <a href="#" class="side-link main-option">.</a>
        </div>
    </div>

    <!-- Sign In Modal -->
    <div class="modal-overlay" id="signin-modal">
        <div class="modal-card">
            <button class="modal-close" id="signin-close">✕</button>
            <div class="modal-logo">lmixi</div>
            <h2 class="modal-title" data-i18n="signin_title">Welcome Back</h2>
            <p class="modal-subtitle" data-i18n="signin_subtitle">Sign in to your account</p>
            <form class="signin-form" id="signin-form">
                <div class="form-group">
                    <label for="signin-email" data-i18n="signin_email">Email</label>
                    <input type="email" id="signin-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signin-password" data-i18n="signin_password">Password</label>
                    <input type="password" id="signin-password" placeholder="••••••••" required>
                </div>
                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me">
                        <span data-i18n="signin_remember">Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" data-i18n="signin_forgot">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-full" data-i18n="nav_signin">Sign In</button>
            </form>
            <p class="modal-footer-text">
                <span data-i18n="signin_noaccount">Don't have an account?</span>
                <a href="#" class="signup-link" data-i18n="signin_signup">Sign Up</a>
            </p>
        </div>
    </div>

    <main>
        <!-- Hero Section -->
        <section id="home" class="hero">
            <div class="hero-content">
                <div class="hero-logo" id="hero-logo-img">
                    <svg class="logo-svg" viewBox="0 0 420 100" xmlns="http://www.w3.org/2000/svg">
                        <text class="logo-svg-base" x="50%" y="75" text-anchor="middle">lmixi</text>
                        <text class="logo-svg-neon" x="50%" y="75" text-anchor="middle">lmixi</text>
                    </svg>
                </div>
                
                <div class="hero-contact-methods">
                    <a href="mailto:hello@lmixi.com" class="hero-social-btn" aria-label="Email">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    </a>
                    <a href="tel:+123456789" class="hero-social-btn" aria-label="Phone">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    </a>
                    <a href="#" class="hero-social-btn" aria-label="Twitter">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    </a>
                    <a href="#" class="hero-social-btn" aria-label="Instagram">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
