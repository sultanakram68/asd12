<!DOCTYPE html>
<html lang="ar" dir="rtl" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - lmixi</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6A00',
                        accent: '#8A5CFF',
                        base: '#F8F9FA',
                    }
                }
            }
        }
    </script>
    <!-- Theme Toggle Initialization (Prevents flickering) -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Tajawal', 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }
        
        .glass-panel {
            background: linear-gradient(135deg, rgba(138, 92, 255, 0.08) 0%, rgba(138, 92, 255, 0.03) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(138, 92, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: rgba(138, 92, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(138, 92, 255, 0.15);
            transition: all 0.3s ease;
        }

        .text-gradient-primary {
            background: linear-gradient(to right, #FF6A00, #ff8c33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ambient-glow {
            position: absolute;
            filter: blur(100px);
            opacity: 0.15;
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

    .animated-text-logo {
            background: linear-gradient(270deg, #FF6A00, #ff0055, #00d4ff, #8A5CFF, #FF6A00);
            background-size: 400% 400%;
            animation: gradientMove 5s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            display: inline-block;
        }
    </style>
</head>
<body class="relative overflow-x-hidden bg-[#FAFAFA] dark:bg-[#05060A] text-gray-900 dark:text-white transition-colors duration-300 min-h-screen flex flex-col">
    
    <!-- Ambient Lighting -->
    <div class="ambient-glow bg-primary w-[600px] h-[600px] top-[-200px] right-[-200px]"></div>
    
    <!-- Simple Header -->
    <header class="w-full px-4 md:px-6 py-6 flex justify-center items-center relative z-50 max-w-5xl mx-auto">
        <div class="text-2xl font-black tracking-tighter animated-text-logo cursor-pointer absolute md:static" onclick="window.location.href='index.html'">lmixi</div>
        <a href="index.html" class="flex items-center gap-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors mr-auto">
            <span data-i18n="back">العودة للرئيسية</span> <i data-lucide="arrow-left" class="w-4 h-4"></i>
        </a>
    </header>

    <!-- Settings Content -->
    <main class="flex-grow flex flex-col items-center pt-10 px-4 md:px-6 relative z-20 w-full max-w-3xl mx-auto">
        <div class="w-full flex items-center gap-3 mb-10">
            <i data-lucide="settings" class="w-8 h-8 text-primary"></i>
            <h1 class="text-3xl md:text-4xl font-bold" data-i18n="title">الإعدادات</h1>
        </div>
        
        <!-- Appearance Card -->
        <div class="glass-card w-full p-6 md:p-8 rounded-3xl flex flex-col gap-6 bg-white/50 dark:bg-black/20 shadow-lg">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h2 class="text-xl font-semibold mb-2" data-i18n="appearance">المظهر (Appearance)</h2>
                    <p class="text-sm text-gray-600 dark:text-gray-400" data-i18n="appearance_desc">قم باختيار النمط المفضل لك لتصفح الموقع المريح للعين.</p>
                </div>
                
                <!-- Toggle Buttons -->
                <div class="flex items-center gap-2 bg-black/5 dark:bg-white/5 p-1.5 rounded-2xl border border-black/10 dark:border-white/10 w-full md:w-auto">
                    <button id="light-btn" class="flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300">
                        <i data-lucide="sun" class="w-4 h-4"></i> <span data-i18n="light">فاتح</span>
                    </button>
                    <button id="dark-btn" class="flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300">
                        <i data-lucide="moon" class="w-4 h-4"></i> <span data-i18n="dark">داكن</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Language Card -->
        <div class="glass-card w-full p-6 md:p-8 rounded-3xl flex flex-col gap-6 bg-white/50 dark:bg-black/20 shadow-lg mt-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h2 class="text-xl font-semibold mb-2" data-i18n="language">اللغة (Language)</h2>
                    <p class="text-sm text-gray-600 dark:text-gray-400" data-i18n="language_desc">اختر لغتك المفضلة لتصفح الموقع.</p>
                </div>
                
                <!-- Language Selector -->
                <div class="relative w-full md:w-auto">
                    <button id="lang-toggle-btn" class="flex items-center justify-between w-full md:w-48 px-5 py-3 rounded-2xl bg-white dark:bg-black/40 border border-black/10 dark:border-white/10 shadow-sm transition-all duration-300">
                        <div class="flex items-center gap-2">
                            <i data-lucide="globe" class="w-5 h-5 text-gray-500 dark:text-gray-400"></i>
                            <span id="current-lang-text" class="text-sm font-medium">العربية</span>
                        </div>
                        <i data-lucide="chevron-down" id="lang-chevron" class="w-4 h-4 text-gray-500 dark:text-gray-400 transition-transform duration-300"></i>
                    </button>
                    
                    <!-- Dropdown -->
                    <div id="lang-dropdown" class="absolute top-full right-0 mt-2 w-full md:w-48 bg-white dark:bg-[#121212] border border-black/10 dark:border-white/10 rounded-2xl shadow-xl overflow-hidden transition-all duration-300 opacity-0 pointer-events-none transform -translate-y-2 z-50">
                        <button class="lang-option w-full flex items-center gap-3 px-4 py-3 hover:bg-black/5 dark:hover:bg-white/5 transition-colors" data-lang="العربية">
                            <span class="text-sm font-medium flex-1 text-right">العربية</span>
                        </button>
                        <button class="lang-option w-full flex items-center gap-3 px-4 py-3 hover:bg-black/5 dark:hover:bg-white/5 transition-colors" data-lang="English">
                            <span class="text-sm font-medium flex-1 text-left">English</span>
                        </button>
                        <button class="lang-option w-full flex items-center gap-3 px-4 py-3 hover:bg-black/5 dark:hover:bg-white/5 transition-colors" data-lang="Türkçe">
                            <span class="text-sm font-medium flex-1 text-left">Türkçe</span>
                        </button>
                        <button class="lang-option w-full flex items-center gap-3 px-4 py-3 hover:bg-black/5 dark:hover:bg-white/5 transition-colors" data-lang="Deutsch">
                            <span class="text-sm font-medium flex-1 text-left">Deutsch</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-6 mt-auto border-t border-black/5 dark:border-white/5 relative z-10">
        <p class="text-sm text-gray-500 dark:text-gray-400 transition-colors">
            © 2026 lmixi. جميع الحقوق محفوظة.
        </p>
    </footer>

    <!-- Language Confirmation Modal -->
    <div id="lang-modal" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity duration-300" id="lang-modal-backdrop"></div>
        
        <!-- Modal Content -->
        <div class="glass-card relative z-10 w-full max-w-sm p-6 rounded-3xl mx-4 transform scale-95 transition-transform duration-300 bg-white/80 dark:bg-black/60 shadow-2xl border border-white/20 dark:border-white/10" id="lang-modal-content">
            <div class="flex items-center gap-3 mb-4 text-primary">
                <i data-lucide="globe" class="w-6 h-6"></i>
                <h3 class="text-lg font-bold" data-i18n="modal_title">تأكيد تغيير اللغة</h3>
            </div>
            <p class="text-gray-600 dark:text-gray-300 text-sm mb-6 leading-relaxed">
                <span data-i18n="modal_desc">هل أنت متأكد أنك تريد تغيير لغة الموقع إلى</span> <strong id="pending-lang-name" class="text-gray-900 dark:text-white"></strong>؟
            </p>
            <div class="flex items-center gap-3">
                <button id="lang-confirm-btn" class="flex-1 px-4 py-2.5 rounded-xl bg-gradient-to-r from-primary to-[#ff8c33] text-white font-semibold text-sm shadow-md hover:shadow-lg hover:shadow-primary/30 transition-all duration-300">
                    <span data-i18n="modal_confirm">تأكيد</span>
                </button>
                <button id="lang-cancel-btn" class="flex-1 px-4 py-2.5 rounded-xl bg-gray-200 dark:bg-white/10 text-gray-800 dark:text-white font-semibold text-sm hover:bg-gray-300 dark:hover:bg-white/20 transition-all duration-300">
                    <span data-i18n="modal_cancel">إلغاء</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Logic for Theme Toggle -->
    <script>
        // Initialize Icons
        lucide.createIcons();

        const lightBtn = document.getElementById('light-btn');
        const darkBtn = document.getElementById('dark-btn');
        const htmlElement = document.documentElement;

        // Function to update the active button styles visually
        function updateButtonStyles(isDark) {
            if (isDark) {
                // Active Dark Button
                darkBtn.className = "flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300 bg-white/10 dark:bg-black/40 shadow-md text-white border border-white/10";
                // Inactive Light Button
                lightBtn.className = "flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300 text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white border border-transparent";
            } else {
                // Active Light Button
                lightBtn.className = "flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300 bg-white shadow-md text-gray-900 border border-black/5";
                // Inactive Dark Button
                darkBtn.className = "flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300 text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white border border-transparent";
            }
        }

        // Set initial state based on HTML class
        updateButtonStyles(htmlElement.classList.contains('dark'));

        // Event Listeners
        lightBtn.addEventListener('click', () => {
            htmlElement.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            updateButtonStyles(false);
        });

        darkBtn.addEventListener('click', () => {
            htmlElement.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            updateButtonStyles(true);
        });

        // Language Dropdown Logic
        const langToggleBtn = document.getElementById('lang-toggle-btn');
        const langDropdown = document.getElementById('lang-dropdown');
        const langChevron = document.getElementById('lang-chevron');
        const currentLangText = document.getElementById('current-lang-text');
        const langOptions = document.querySelectorAll('.lang-option');

        let isLangDropdownOpen = false;

        langToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isLangDropdownOpen = !isLangDropdownOpen;
            
            if (isLangDropdownOpen) {
                langDropdown.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-2');
                langDropdown.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
                langChevron.classList.add('rotate-180');
            } else {
                langDropdown.classList.add('opacity-0', 'pointer-events-none', '-translate-y-2');
                langDropdown.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
                langChevron.classList.remove('rotate-180');
            }
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
            if (isLangDropdownOpen) {
                isLangDropdownOpen = false;
                langDropdown.classList.add('opacity-0', 'pointer-events-none', '-translate-y-2');
                langDropdown.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
                langChevron.classList.remove('rotate-180');
            }
        });

        // Language Modal Logic
        let pendingLang = null;
        const langModal = document.getElementById('lang-modal');
        const langModalContent = document.getElementById('lang-modal-content');
        const pendingLangName = document.getElementById('pending-lang-name');
        
        function showLangModal(lang) {
            pendingLang = lang;
            pendingLangName.textContent = lang;
            langModal.classList.remove('opacity-0', 'pointer-events-none');
            langModalContent.classList.remove('scale-95');
            langModalContent.classList.add('scale-100');
        }

        function hideLangModal() {
            langModal.classList.add('opacity-0', 'pointer-events-none');
            langModalContent.classList.remove('scale-100');
            langModalContent.classList.add('scale-95');
            pendingLang = null;
        }

        document.getElementById('lang-cancel-btn').addEventListener('click', hideLangModal);
        document.getElementById('lang-modal-backdrop').addEventListener('click', hideLangModal);
        
        document.getElementById('lang-confirm-btn').addEventListener('click', () => {
            if (pendingLang) {
                currentLangText.textContent = pendingLang;
                localStorage.setItem('language', pendingLang);
                updateLanguage(pendingLang);
            }
            hideLangModal();
            // Close the dropdown too
            if (isLangDropdownOpen) {
                isLangDropdownOpen = false;
                langDropdown.classList.add('opacity-0', 'pointer-events-none', '-translate-y-2');
                langDropdown.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
                langChevron.classList.remove('rotate-180');
            }
        });

        // Select language triggers modal
        langOptions.forEach(option => {
            option.addEventListener('click', () => {
                const selectedLang = option.getAttribute('data-lang');
                if (selectedLang !== currentLangText.textContent) {
                    showLangModal(selectedLang);
                }
            });
        });

        // i18n Translation Dictionary
        const translations = {
            'العربية': {
                'back': 'العودة للرئيسية',
                'title': 'الإعدادات',
                'appearance': 'المظهر (Appearance)',
                'appearance_desc': 'قم باختيار النمط المفضل لك لتصفح الموقع المريح للعين.',
                'light': 'فاتح',
                'dark': 'داكن',
                'language': 'اللغة (Language)',
                'language_desc': 'اختر لغتك المفضلة لتصفح الموقع.',
                'footer': '© 2026 lmixi. جميع الحقوق محفوظة.',
                'modal_title': 'تأكيد تغيير اللغة',
                'modal_desc': 'هل أنت متأكد أنك تريد تغيير لغة الموقع إلى',
                'modal_confirm': 'تأكيد',
                'modal_cancel': 'إلغاء'
            },
            'English': {
                'back': 'Back to Home',
                'title': 'Settings',
                'appearance': 'Appearance',
                'appearance_desc': 'Choose your preferred theme for a comfortable browsing experience.',
                'light': 'Light',
                'dark': 'Dark',
                'language': 'Language',
                'language_desc': 'Choose your preferred language for browsing.',
                'footer': '© 2026 lmixi. All rights reserved.',
                'modal_title': 'Confirm Language Change',
                'modal_desc': 'Are you sure you want to change the site language to',
                'modal_confirm': 'Confirm',
                'modal_cancel': 'Cancel'
            },
            'Türkçe': {
                'back': 'Ana Sayfaya Dön',
                'title': 'Ayarlar',
                'appearance': 'Görünüm',
                'appearance_desc': 'Rahat bir tarama deneyimi için tercih ettiğiniz temayı seçin.',
                'light': 'Açık',
                'dark': 'Koyu',
                'language': 'Dil',
                'language_desc': 'Gezinmek için tercih ettiğiniz dili seçin.',
                'footer': '© 2026 lmixi. Tüm hakları saklıdır.',
                'modal_title': 'Dil Değişikliğini Onayla',
                'modal_desc': 'Site dilini değiştirmek istediğinizden emin misiniz:',
                'modal_confirm': 'Onayla',
                'modal_cancel': 'İptal'
            },
            'Deutsch': {
                'back': 'Zurück zur Startseite',
                'title': 'Einstellungen',
                'appearance': 'Erscheinungsbild',
                'appearance_desc': 'Wählen Sie Ihr bevorzugtes Design für ein angenehmes Surferlebnis.',
                'light': 'Hell',
                'dark': 'Dunkel',
                'language': 'Sprache',
                'language_desc': 'Wählen Sie Ihre bevorzugte Sprache.',
                'footer': '© 2026 lmixi. Alle Rechte vorbehalten.',
                'modal_title': 'Sprachwechsel bestätigen',
                'modal_desc': 'Sind Sie sicher, dass Sie die Sprache ändern möchten in',
                'modal_confirm': 'Bestätigen',
                'modal_cancel': 'Abbrechen'
            }
        };

        function updateLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            // Intentionally not changing document direction (dir) 
            // so the layout structure remains stable without shifting.
        }

        // Initialize language on load
        const savedLang = localStorage.getItem('language');
        if (savedLang) {
            currentLangText.textContent = savedLang;
            updateLanguage(savedLang);
        }
    </script>
</body>
</html>
