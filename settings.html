<!DOCTYPE html>
<html lang="ar" dir="rtl" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - LIMIXI</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6A00',
                        accent: '#8A5CFF',
                        base: '#F8F9FA',
                    }
                }
            }
        }
    </script>
    <!-- Theme Toggle Initialization (Prevents flickering) -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Tajawal', 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }
        
        .glass-panel {
            background: linear-gradient(135deg, rgba(138, 92, 255, 0.08) 0%, rgba(138, 92, 255, 0.03) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(138, 92, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: rgba(138, 92, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(138, 92, 255, 0.15);
            transition: all 0.3s ease;
        }

        .text-gradient-primary {
            background: linear-gradient(to right, #FF6A00, #ff8c33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ambient-glow {
            position: absolute;
            filter: blur(100px);
            opacity: 0.15;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body class="relative overflow-x-hidden bg-[#FAFAFA] dark:bg-[#05060A] text-gray-900 dark:text-white transition-colors duration-300 min-h-screen flex flex-col">
    
    <!-- Ambient Lighting -->
    <div class="ambient-glow bg-primary w-[600px] h-[600px] top-[-200px] right-[-200px]"></div>
    
    <!-- Simple Header -->
    <header class="w-full px-4 md:px-6 py-6 flex justify-between items-center relative z-50 max-w-5xl mx-auto">
        <div class="text-2xl font-bold tracking-tighter text-gradient-primary cursor-pointer" onclick="window.location.href='index.html'">LIMIXI</div>
        <a href="index.html" class="flex items-center gap-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white transition-colors">
            العودة للرئيسية <i data-lucide="arrow-left" class="w-4 h-4"></i>
        </a>
    </header>

    <!-- Settings Content -->
    <main class="flex-grow flex flex-col items-center pt-10 px-4 md:px-6 relative z-10 w-full max-w-3xl mx-auto">
        <div class="w-full flex items-center gap-3 mb-10">
            <i data-lucide="settings" class="w-8 h-8 text-primary"></i>
            <h1 class="text-3xl md:text-4xl font-bold">الإعدادات</h1>
        </div>
        
        <!-- Appearance Card -->
        <div class="glass-card w-full p-6 md:p-8 rounded-3xl flex flex-col gap-6 bg-white/50 dark:bg-black/20 shadow-lg">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h2 class="text-xl font-semibold mb-2">المظهر (Appearance)</h2>
                    <p class="text-sm text-gray-600 dark:text-gray-400">قم باختيار النمط المفضل لك لتصفح الموقع المريح للعين.</p>
                </div>
                
                <!-- Toggle Buttons -->
                <div class="flex items-center gap-2 bg-black/5 dark:bg-white/5 p-1.5 rounded-2xl border border-black/10 dark:border-white/10 w-full md:w-auto">
                    <button id="light-btn" class="flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300">
                        <i data-lucide="sun" class="w-4 h-4"></i> فاتح
                    </button>
                    <button id="dark-btn" class="flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300">
                        <i data-lucide="moon" class="w-4 h-4"></i> داكن
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Logic for Theme Toggle -->
    <script>
        // Initialize Icons
        lucide.createIcons();

        const lightBtn = document.getElementById('light-btn');
        const darkBtn = document.getElementById('dark-btn');
        const htmlElement = document.documentElement;

        // Function to update the active button styles visually
        function updateButtonStyles(isDark) {
            if (isDark) {
                // Active Dark Button
                darkBtn.className = "flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300 bg-white/10 dark:bg-black/40 shadow-md text-white border border-white/10";
                // Inactive Light Button
                lightBtn.className = "flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300 text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white border border-transparent";
            } else {
                // Active Light Button
                lightBtn.className = "flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300 bg-white shadow-md text-gray-900 border border-black/5";
                // Inactive Dark Button
                darkBtn.className = "flex-1 flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-300 text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white border border-transparent";
            }
        }

        // Set initial state based on HTML class
        updateButtonStyles(htmlElement.classList.contains('dark'));

        // Event Listeners
        lightBtn.addEventListener('click', () => {
            htmlElement.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            updateButtonStyles(false);
        });

        darkBtn.addEventListener('click', () => {
            htmlElement.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            updateButtonStyles(true);
        });
    </script>
</body>
</html>
