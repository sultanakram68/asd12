<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMIXI - قريباً</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            padding: 1rem;
        }
        .coming-soon-container {
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-orange);
            padding: 4rem 2rem;
            border-radius: var(--r-lg);
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 2;
            animation: floatUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(50px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .icon-large {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #fff, var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .back-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--orange);
            color: #fff;
            text-decoration: none;
            border-radius: var(--r-full);
            font-weight: 700;
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(255,106,0,0.4);
        }
        .back-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 30px rgba(255,106,0,0.6);
        }
    </style>
</head>
<body>
    <div id="particles-bg"></div>
    <div class="ambient-glow"></div>

    <div class="coming-soon-container">
        <div class="icon-large">🚀</div>
        <h1>هذه الميزة قادمة قريباً</h1>
        <p>نعمل بشغف في مختبرات LMIXI لتطوير هذه الواجهة لتكون الأفضل على الإطلاق. شكراً لانتظارك!</p>
        <a href="index.html" class="back-btn">العودة للرئيسية</a>
    </div>

    <!-- We can reuse the particles script if needed, but it's loaded in index.html. To keep this simple we'll just show the static background. -->
</body>
</html>
