<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMIXI Admin - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .admin-login-card {
            background: var(--glass-strong);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-orange);
            padding: 3rem 2.5rem;
            border-radius: var(--r-lg);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            position: relative;
            z-index: 10;
        }
        .admin-login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .admin-logo {
            font-size: 2.5rem;
            font-family: var(--font-en);
            font-weight: 900;
            background: linear-gradient(90deg, var(--orange), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
        .admin-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        .error-msg {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            padding: 0.8rem;
            border-radius: var(--r-sm);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 68, 68, 0.3);
            display: none;
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div id="particles-bg"></div>

    <div class="admin-login-card">
        <div class="admin-login-header">
            <div class="admin-logo">LMIXI</div>
            <div class="admin-subtitle">لوحة التحكم الإدارية</div>
        </div>

        <div id="login-error" class="error-msg"></div>

        <form id="admin-login-form">
            <div class="form-group">
                <label>البريد الإلكتروني (الإدارة فقط)</label>
                <input type="email" id="admin-email" placeholder="أدخل إيميل الإدارة" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="admin-pass" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1rem; box-shadow: 0 0 20px var(--orange-glow);">دخول آمن</button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="admin.js"></script>
</body>
</html>
